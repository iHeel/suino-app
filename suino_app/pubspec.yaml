name: suino_app
description: Controle de Porcas - Manejo reprodutivo de suínos
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Banco de dados local
  sqflite: ^2.3.3
  path: ^1.9.0

  # Gerenciamento de estado
  provider: ^6.1.2

  # Notificações locais
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Seletor de imagem (câmera / galeria)
  image_picker: ^1.1.2

  # Permissões
  permission_handler: ^11.3.1

  # Formatação de datas em PT-BR
  intl: ^0.19.0

  # Ícones extras
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
